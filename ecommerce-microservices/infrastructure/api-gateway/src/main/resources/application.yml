server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # Product Service Routes
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1

        # Order Service Routes
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        # Payment Service Routes
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        # Cart Service Routes
        - id: cart-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1

        # Inventory Service Routes
        - id: inventory-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=1

        # Notification Service Routes
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

        # Review Service Routes
        - id: review-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/reviews/**
          filters:
            - StripPrefix=1

        # Analytics Service Routes
        - id: analytics-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1

      circuitbreaker:
        configs:
          default:
            failure-rate-threshold: 50
            minimum-number-of-calls: 5
            wait-duration-in-open-state: 30s
            sliding-window-size: 10
            sliding-window-type: count

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: false
    fetch-registry: false
  instance:
    prefer-ip-address: true

jwt:
  secret: mySecretKey123456789012345678901234567890

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.ecommerce.gateway: DEBUG
