  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: khanadnan39@gmail.com
    password: wzndqvkwmesigqdb
    properties:
      mail:
        smtp:
          auth: true
          starttls:
